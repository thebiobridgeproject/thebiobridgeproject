<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Sent – The BioBridge Project</title>

  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f8fafc;
      text-align: center;
      padding: 100px 20px;
      color: #0f766e;
    }

    .box {
      max-width: 600px;
      margin: auto;
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 2.5rem;
      color: #0891b2;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
    }

    a {
      display: inline-block;
      background: #0891b2;
      color: #fff;
      padding: 1rem 2rem;
      border-radius: 30px;
      font-size: 1.2rem;
      font-weight: bold;
      text-decoration: none;
      transition: background 0.2s;
    }

    a:hover {
      background: #0f766e;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Thank You!</h1>
    <p>Your message has been successfully sent. We’ll get back to you soon.</p>
    <a href="index.html">Return to Home</a>
  </div>
</body>
</html>
